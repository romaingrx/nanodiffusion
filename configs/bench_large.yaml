# Benchmark: ~1.15B params (20L/2048h/16heads)
# Well above v6e roofline (AI ≈ 862 >> 574)
model:
  num_layers: 20
  hidden_dim: 2048
  num_heads: 16
  max_seq_len: 1024
  ffn_mult: 4
  compute_dtype: bfloat16
  remat_policy: none

train:
  seed: 42
  batch_size: 32
  learning_rate: 3e-4
  weight_decay: 0.1
  warmup_steps: 5
  max_steps: 50
  ema_decay: 0.9999
  grad_clip: 1.0
  log_every: 10
  save_every: 200
  run_dir: runs/pretrain

data:
  dataset: fineweb-edu-10bt
  data_dir: data
  num_train_shards: 1
  tokenizer_batch_size: 128
  tokenizer_threads: 8
  prefetch_size: 4
  max_empty_passes: 100
