# yaml-language-server: $schema=./config.schema.json

# Medium config — targets ROM-18 (8xH100, ~4h, ~11B FineWeb-EDU tokens,
# then SFT). ~303M params: 20L x 1024h x 16 heads x ffn_mult=4.
#
# Sizing rationale (see ROM-18 research notes):
# - MDLM (Sahoo et al., 2024) ships a 110M / 12L-768h-12h baseline on
#   OpenWebText and gets legible English — that's the documented floor.
# - SEDD-medium (Lou et al., 2024) uses 24L-1024h-16h ≈ 320M and is
#   the strongest sub-400M published masked-diffusion LM.
# - Masked diffusion carries a ~constant-factor capacity penalty vs AR
#   at matched compute in single-epoch settings (see "Autoregressive vs.
#   Masked Diffusion: A Controlled Comparison" and "Scaling Behavior of
#   Discrete Diffusion Language Models"), so the AR sweet spot at this
#   budget (~200M for nanoGPT/nanochat) shifts up for MDLM.
# - nanochat d20 (560M, 20L-1280h-10h) trains AR on 11B FineWeb-EDU in
#   ~3h on 8xH100. Going to 560M for MDLM at the same wall-clock would
#   leave us meaningfully undertrained — balanced 303M is the sweet
#   spot for "decent, coherent, not SoTa".

model:
  num_layers: 20
  hidden_dim: 1024
  num_heads: 16
  max_seq_len: 1024
  ffn_mult: 4
  compute_dtype: bfloat16
  remat_policy: none

# Pretrain: ~11B tokens. On v6e-8 with batch_size=64 (per-chip=8, matches
# the bs=32-on-v6e-4 sweet spot from exp 003), seq_len=1024 gives 65,536
# tokens/step → ~168k steps for 11B tokens. The earlier comment assuming
# "32 per device x 8 devices = 256 global" was wishful; batch_size here is
# global and is sharded across whatever chips the loop sees. Keep per-chip
# at ~8 to stay within HBM at remat=none (16/chip OOMs the attention score
# matrix at this seq length). For a v6e-4, drop batch_size to 32 and double
# max_steps to 336000.
train:
  seed: 42
  batch_size: 64
  learning_rate: 3e-4
  weight_decay: 0.1
  warmup_steps: 1000
  max_steps: 168000
  ema_decay: 0.9999
  grad_clip: 1.0
  log_every: 50
  # save_every=10000: with the async background save (PR #24), training only
  # blocks if the previous save hasn't finished by the next save trigger
  # (queue depth 1). Equinox serialisation currently writes through gcsfuse
  # at ~3 MB/s (a 6.8 GB ckpt takes ~30 min), so save_every must be > the
  # save duration in training time. At ~252 ms/step, 10000 steps ≈ 42 min,
  # comfortably > 30 min. Preempt loss capped at 10000 steps ≈ 42 min.
  # Drop back to 1000 once the Orbax + TensorStore migration lands.
  save_every: 10000
  run_dir: runs/pretrain

sft:
  seed: 42
  batch_size: 16
  learning_rate: 1e-4
  weight_decay: 0.0
  warmup_steps: 100
  max_steps: 3000
  ema_decay: 0.999
  grad_clip: 1.0
  log_every: 20
  save_every: 500
  run_dir: runs/sft
  datasets:
    - name: smoltalk
      epochs: 1
    - name: gsm8k
      epochs: 4
    - name: identity
      epochs: 2
  tokenizer_batch_size: 128
  tokenizer_threads: 4
  prefetch_size: 4
  max_empty_passes: 100

sample:
  steps: 64
  temperature: 1.0
  top_k: 0
  top_p: 1.0
  max_length: 256

data:
  dataset: fineweb-edu-10bt
  data_dir: data
  num_train_shards: 13
  tokenizer_batch_size: 128
  tokenizer_threads: 8
  prefetch_size: 4
  max_empty_passes: 100
