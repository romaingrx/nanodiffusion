model:
  num_layers: 3
  hidden_dim: 192
  num_heads: 3
  max_seq_len: 512
  dropout_rate: 0.0
  ffn_mult: 4

# The debug config still lists a pretrain dataset so `nanodiffusion data`
# and any shared loader machinery keep working; SFT itself never reads it.
data:
  dataset: fineweb-edu-10bt
  data_dir: data
  num_train_shards: 1

sft:
  seed: 42
  batch_size: 4
  learning_rate: 1e-4
  weight_decay: 0.0
  warmup_steps: 50
  max_steps: 500
  ema_decay: 0.999
  grad_clip: 1.0
  log_every: 20
  save_every: 100
  run_dir: runs/sft

  # The full ROM-17 mixture mirrors nanochat's SFT recipe. Smaller
  # datasets are oversampled via `epochs` so they leave a trace in the
  # final model. Trim or comment entries out for a quick smoke run.
  datasets:
    - name: smoltalk
      epochs: 1
    - name: gsm8k
      epochs: 4
    - name: identity
      epochs: 2

  tokenizer_batch_size: 128
  tokenizer_threads: 4
  prefetch_size: 2
  max_empty_passes: 100
